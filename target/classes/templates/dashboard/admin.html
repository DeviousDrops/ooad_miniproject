<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand">Admin Dashboard</div>
        <div class="actions">
            <a class="btn btn-ghost" href="/">Home</a>
            <form method="post" action="/logout">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>

    <section class="panel" th:if="${successMessage}">
        <p th:text="${successMessage}"></p>
    </section>
    <section class="panel" th:if="${infoMessage}">
        <p th:text="${infoMessage}"></p>
    </section>

    <section class="panel">
        <h3>Manage Medicine Inventory (CRUD)</h3>
        <form method="post" action="/admin/medicine/save" class="two-col">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label for="inventoryId">Inventory ID</label>
                <input id="inventoryId" name="inventoryId" type="number" min="1" value="1" required>

                <label for="name">Medicine Name</label>
                <input id="name" name="name" required>

                <label for="category">Category</label>
                <input id="category" name="category" required>

                <label for="manufacturer">Manufacturer</label>
                <input id="manufacturer" name="manufacturer" required>
            </div>
            <div>
                <label for="price">Price</label>
                <input id="price" name="price" type="number" step="0.01" min="0.01" required>

                <label for="stockQty">Stock Quantity</label>
                <input id="stockQty" name="stockQty" type="number" min="0" required>

                <label for="expiryDate">Expiry Date</label>
                <input id="expiryDate" name="expiryDate" type="date" required>

                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-primary" type="submit">Save Medicine</button>
                </div>
            </div>
        </form>

        <form method="post" action="/admin/medicine/delete" style="margin-top:16px;" class="two-col">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label for="medicineId">Medicine ID to delete</label>
                <input id="medicineId" name="medicineId" type="number" min="1" required>
            </div>
            <div class="actions" style="align-items:end;">
                <button class="btn btn-danger" type="submit">Delete Medicine</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <h3>Reports</h3>
        <div class="actions">
            <form method="post" action="/admin/report/sales">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-secondary" type="submit">Generate Sales Analytics</button>
            </form>
            <form method="post" action="/admin/report/inventory">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-ghost" type="submit">Generate Inventory Report</button>
            </form>
        </div>
    </section>

    <section class="panel">
        <h3>Low Stock Alerts (Observer)</h3>
        <p class="small-note" th:if="${#lists.isEmpty(alerts)}">No low stock alerts yet.</p>
        <ul th:if="${!#lists.isEmpty(alerts)}">
            <li th:each="alert : ${alerts}" th:text="${alert}"></li>
        </ul>
    </section>

    <section class="panel">
        <h3>Automated Supply Actions (@Scheduled)</h3>
        <p class="small-note" th:if="${#lists.isEmpty(automationActions)}">No automation actions recorded yet.</p>
        <ul th:if="${!#lists.isEmpty(automationActions)}">
            <li th:each="action : ${automationActions}" th:text="${action}"></li>
        </ul>
    </section>
</div>
</body>
</html>
