<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PharmaFlow</title>
    <!-- Using Bootstrap 5 for the Tabbed Layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="text-center mb-4">
        <h2 class="brand" style="color: var(--primary);">PharmaFlow</h2>
    </div>
    
    <!-- Tab Navigation -->
    <ul class="nav nav-tabs" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup" type="button" role="tab">New Customer Sign Up</button>
        </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content border border-top-0 p-4 bg-white shadow-sm rounded-bottom" id="authTabsContent">
        
        <!-- Login Form -->
        <div class="tab-pane fade show active" id="login" role="tabpanel">
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <select class="form-select" id="role" name="role">
                        <option value="CUSTOMER">Customer</option>
                        <option value="PHARMACIST">Pharmacist</option>
                        <option value="ADMIN">Admin</option>
                        <option value="SUPPLIER">Supplier</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label">Username / Phone Number</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter username or 10-digit phone" required autofocus />
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required />
                </div>
                <div th:if="${param.error}" class="alert alert-danger py-2">
                    Invalid username, password, or role.
                </div>
                <div th:if="${param.logout}" class="alert alert-success py-2">
                    You have been logged out.
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
            </form>
        </div>

        <!-- Sign Up Form (Customers Only) -->
        <div class="tab-pane fade" id="signup" role="tabpanel">
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label for="newFullName" class="form-label">Full Name</label>
                    <input type="text" id="newFullName" name="fullName" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="newPhone" class="form-label">Phone Number (10 digits)</label>
                    <input type="tel" id="newPhone" name="phone" class="form-control" pattern="[0-9]{10}" placeholder="e.g. 9876543210" required />
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">Password</label>
                    <input type="password" id="newPassword" name="password" class="form-control" required />
                </div>
                <button type="submit" class="btn btn-success w-100 mt-2">Sign Up</button>
            </form>
        </div>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
