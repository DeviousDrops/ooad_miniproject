<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · PharmaFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
    <div class="login-box">
        <div class="brand">PharmaFlow Access</div>
        <h2>Sign In</h2>
        <p class="small-note">Use one of the actor credentials to access role-specific dashboards.</p>

        <form method="post" action="/login">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>

            <div class="actions" style="margin-top:14px;">
                <button class="btn btn-primary" type="submit">Login</button>
                <a href="/" class="btn btn-ghost">Back to Home</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
