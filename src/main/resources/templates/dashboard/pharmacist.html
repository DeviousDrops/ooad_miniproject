<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacist Dashboard</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand">Pharmacist Dashboard</div>
        <div class="actions">
            <a class="btn btn-ghost" href="/">Home</a>
            <form method="post" action="/logout">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>

    <section class="panel" th:if="${successMessage}">
        <p th:text="${successMessage}"></p>
    </section>
    <section class="panel" th:if="${infoMessage}">
        <p th:text="${infoMessage}"></p>
    </section>

    <section class="panel two-col">
        <div>
            <h3>Verify Stock Availability</h3>
            <form method="post" action="/pharmacist/verify-stock">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="verifyMedicineId">Medicine ID</label>
                <input id="verifyMedicineId" name="medicineId" type="number" min="1" required>
                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-primary" type="submit">Verify</button>
                </div>
            </form>
        </div>

        <div>
            <h3>Process Customer Billing</h3>
            <form method="post" action="/pharmacist/process-billing">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="orderId">Order ID</label>
                <input id="orderId" name="orderId" type="number" min="1" required>
                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-secondary" type="submit">Process Bill</button>
                </div>
            </form>
        </div>
    </section>

    <section class="panel">
        <h3>Update Inventory Status</h3>
        <form method="post" action="/pharmacist/update-inventory" class="two-col">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label for="updateMedicineId">Medicine ID</label>
                <input id="updateMedicineId" name="medicineId" type="number" min="1" required>
            </div>
            <div>
                <label for="qty">Quantity Adjustment (+/-)</label>
                <input id="qty" name="qty" type="number" required>
                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-primary" type="submit">Update</button>
                </div>
            </div>
        </form>
    </section>

    <section class="panel">
        <h3>Current Medicines</h3>
        <p class="small-note" th:text="'Total medicines: ' + ${#lists.size(medicines)}"></p>
    </section>
</div>
</body>
</html>
