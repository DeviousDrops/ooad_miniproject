<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacist Dashboard · PharmaFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand">Pharmacist Dashboard</div>
        <div class="actions">
            <a class="btn btn-ghost" href="/">Home</a>
            <form method="post" action="/logout" style="margin:0;"><button class="btn btn-danger" type="submit">Logout</button></form>
        </div>
    </div>

    <section class="two-col">
        <div class="panel">
            <h3>verifyStock()</h3>
            <label>Medicine ID</label><input id="verifyMedicineId" type="number" value="1">
            <label>Required Quantity</label><input id="verifyQty" type="number" value="2">
            <div class="actions" style="margin-top:10px;"><button class="btn btn-primary" type="button" onclick="verifyStock()">Verify</button></div>
            <pre id="verifyOut" class="output"></pre>
        </div>

        <div class="panel">
            <h3>updateInventoryStatus()</h3>
            <label>Inventory ID</label><input id="inventoryId" type="number" value="1">
            <div class="actions" style="margin-top:10px;"><button class="btn btn-secondary" type="button" onclick="updateInventory()">Update</button></div>
            <pre id="inventoryOut" class="output"></pre>
        </div>
    </section>

    <section class="panel">
        <h3>processCustomerBilling()</h3>
        <p class="small-note">Create an order first from Customer dashboard, then use its orderId here.</p>
        <div class="two-col">
            <div>
                <label>Order ID</label><input id="orderId" type="number" value="1">
                <label>Tax %</label><input id="tax" type="number" step="0.01" value="5">
            </div>
            <div>
                <label>Discount %</label><input id="discount" type="number" step="0.01" value="2">
                <label>Payment Method</label>
                <select id="paymentMethod">
                    <option>UPI</option>
                    <option>CASH</option>
                    <option>CARD</option>
                </select>
            </div>
        </div>
        <div class="actions" style="margin-top:10px;"><button class="btn btn-primary" type="button" onclick="processBilling()">Process Billing</button></div>
        <pre id="billingOut" class="output"></pre>
    </section>
</div>

<script>
async function api(url, method = 'GET', body = null) {
  const options = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) options.body = JSON.stringify(body);
  const res = await fetch(url, options);
  const txt = await res.text();
  let parsed;
  try { parsed = JSON.parse(txt); } catch { parsed = txt; }
  if (!res.ok) throw parsed;
  return parsed;
}

async function verifyStock() {
  try {
    const medicineId = document.getElementById('verifyMedicineId').value;
    const qty = document.getElementById('verifyQty').value;
    const data = await api(`/api/pharmacist/verify-stock?medicineId=${medicineId}&qty=${qty}`);
    document.getElementById('verifyOut').textContent = JSON.stringify({ available: data }, null, 2);
  } catch (e) {
    document.getElementById('verifyOut').textContent = JSON.stringify(e, null, 2);
  }
}

async function updateInventory() {
  try {
    const inventoryId = document.getElementById('inventoryId').value;
    const data = await api(`/api/pharmacist/update-inventory-status/${inventoryId}`, 'PUT');
    document.getElementById('inventoryOut').textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    document.getElementById('inventoryOut').textContent = JSON.stringify(e, null, 2);
  }
}

async function processBilling() {
  try {
    const orderId = document.getElementById('orderId').value;
    const payload = {
      taxPercent: Number(document.getElementById('tax').value),
      discountPercent: Number(document.getElementById('discount').value),
      paymentMethod: document.getElementById('paymentMethod').value
    };
    const data = await api(`/api/pharmacist/process-billing/${orderId}`, 'POST', payload);
    document.getElementById('billingOut').textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    document.getElementById('billingOut').textContent = JSON.stringify(e, null, 2);
  }
}
</script>
</body>
</html>
