<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Dashboard</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand">Supplier Dashboard</div>
        <div class="actions">
            <a class="btn btn-ghost" href="/">Home</a>
            <form method="post" action="/logout">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>

    <section class="panel" th:if="${successMessage}">
        <p th:text="${successMessage}"></p>
    </section>
    <section class="panel" th:if="${infoMessage}">
        <p th:text="${infoMessage}"></p>
    </section>

    <section class="panel two-col">
        <div>
            <h3>Supply Restock</h3>
            <form method="post" action="/supplier/restock">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="supplierId">Supplier ID</label>
                <input id="supplierId" name="supplierId" type="number" min="1" value="7001" required>

                <label for="medicineId">Medicine ID</label>
                <input id="medicineId" name="medicineId" type="number" min="1" required>

                <label for="quantity">Quantity</label>
                <input id="quantity" name="quantity" type="number" min="1" required>

                <label for="expectedDate">Expected Date</label>
                <input id="expectedDate" name="expectedDate" type="date" required>

                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-primary" type="submit">Create Restock</button>
                </div>
            </form>
        </div>

        <div>
            <h3>Shipment Verification</h3>
            <form method="post" action="/supplier/verify-shipment">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="shipmentId">Shipment ID</label>
                <input id="shipmentId" name="shipmentId" type="number" min="1" required>
                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-secondary" type="submit">Verify Shipment</button>
                </div>
            </form>

            <h3 style="margin-top:18px;">Submit Digital Invoice</h3>
            <form method="post" action="/supplier/invoice">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="invoiceShipmentId">Shipment ID</label>
                <input id="invoiceShipmentId" name="shipmentId" type="number" min="1" required>

                <label for="amount">Amount</label>
                <input id="amount" name="amount" type="number" step="0.01" min="0.01" required>

                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-ghost" type="submit">Submit Invoice</button>
                </div>
            </form>
        </div>
    </section>

    <section class="panel">
        <h3>Shipment Summary</h3>
        <p class="small-note" th:text="'Shipments in system: ' + ${#lists.size(shipments)}"></p>
    </section>
</div>
</body>
</html>
