<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Pharmacy System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
    <div class="login-box">
        <div class="brand">Role-Based Secure Login</div>
        <h2>Sign In</h2>
        <p class="small-note" th:if="${param.error}">Invalid username or password.</p>
        <p class="small-note" th:if="${param.logout}">You have been logged out.</p>

        <form method="post" action="/login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label for="username">Username</label>
            <input id="username" name="username" type="text" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>

            <div class="actions" style="margin-top:12px;">
                <button class="btn btn-primary" type="submit">Login</button>
                <a class="btn btn-ghost" href="/">Back</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
