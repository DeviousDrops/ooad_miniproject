<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · PharmaFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand">Admin Dashboard</div>
        <div class="actions">
            <a class="btn btn-ghost" href="/">Home</a>
            <form method="post" action="/logout" style="margin:0;"><button class="btn btn-danger" type="submit">Logout</button></form>
        </div>
    </div>

    <section class="panel">
        <h3>manageMedicineInventory()</h3>
        <div class="two-col">
            <div>
                <label>Inventory ID</label><input id="inventoryId" type="number" value="1">
                <label>Medicine Name</label><input id="name" type="text" value="Amoxicillin 250">
                <label>Category</label><input id="category" type="text" value="Antibiotic">
                <label>Price</label><input id="price" type="number" step="0.01" value="12.5">
                <label>Stock Quantity</label><input id="stockQty" type="number" value="80">
            </div>
            <div>
                <label>Medicine Type</label>
                <select id="medicineType">
                    <option>TABLET</option>
                    <option>SYRUP</option>
                    <option>OTHER</option>
                </select>
                <label>Expiry Date</label><input id="expiryDate" type="date">
                <label>Low Stock Threshold</label><input id="threshold" type="number" value="15">
                <div class="actions" style="margin-top:12px;">
                    <button class="btn btn-primary" onclick="createMedicine()" type="button">Save Medicine</button>
                </div>
            </div>
        </div>
        <pre id="manageOutput" class="output"></pre>
    </section>

    <section class="panel">
        <h3>generateSalesAnalytics()</h3>
        <div class="actions">
            <button class="btn btn-secondary" type="button" onclick="runAnalytics()">Generate Report</button>
            <button class="btn btn-ghost" type="button" onclick="autoSupply()">Automate Supply</button>
        </div>
        <pre id="analyticsOutput" class="output"></pre>
    </section>
</div>

<script>
function futureDate(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
if (!document.getElementById('expiryDate').value) {
  document.getElementById('expiryDate').value = futureDate(120);
}

async function api(url, method = 'GET', body = null) {
  const options = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) options.body = JSON.stringify(body);
  const res = await fetch(url, options);
  const txt = await res.text();
  let parsed;
  try { parsed = JSON.parse(txt); } catch { parsed = txt; }
  if (!res.ok) throw parsed;
  return parsed;
}

async function createMedicine() {
  try {
    const payload = {
      inventoryId: Number(document.getElementById('inventoryId').value),
      name: document.getElementById('name').value,
      category: document.getElementById('category').value,
      price: Number(document.getElementById('price').value),
      stockQty: Number(document.getElementById('stockQty').value),
      medicineType: document.getElementById('medicineType').value,
      expiryDate: document.getElementById('expiryDate').value,
      lowStockThreshold: Number(document.getElementById('threshold').value)
    };
    const data = await api('/api/admin/manage-medicine', 'POST', payload);
    document.getElementById('manageOutput').textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    document.getElementById('manageOutput').textContent = JSON.stringify(e, null, 2);
  }
}

async function runAnalytics() {
  try {
    const data = await api('/api/admin/sales-analytics');
    document.getElementById('analyticsOutput').textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    document.getElementById('analyticsOutput').textContent = JSON.stringify(e, null, 2);
  }
}

async function autoSupply() {
  try {
    const data = await api('/api/admin/automate-supply');
    document.getElementById('analyticsOutput').textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    document.getElementById('analyticsOutput').textContent = JSON.stringify(e, null, 2);
  }
}
</script>
</body>
</html>
